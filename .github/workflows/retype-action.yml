name: Validate and publish Retype documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    name: Validate and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate documentation links and assets
        run: ./scripts/check-docs.sh

      - name: Install pinned Retype runtime
        run: npm install --global retypeapp-linux-x64@4.6.0

      - uses: retypeapp/action-build@latest

      - uses: retypeapp/action-github-pages@latest
        with:
          update-branch: true
